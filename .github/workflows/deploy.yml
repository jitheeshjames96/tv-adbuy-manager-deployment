name: Deploy TV Adbuy Manager

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload compose file
        run: |
          base64 -w 0 compose-prod.yml > compose.b64
          CONTENT=$(cat compose.b64)
      
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
            \"sudo mkdir -p /opt/tv-adbuy-manager\",
            \"echo '$CONTENT' | base64 -d | sudo tee /opt/tv-adbuy-manager/compose-prod.yml > /dev/null\"
            ]"

      - name: Run Deployment Script
        run: |
          aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters commands="[
          \"sudo bash /opt/tv-adbuy-manager/deploy.sh\"
          ]"
